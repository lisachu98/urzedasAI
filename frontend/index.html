<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0f11;
    --surface:  #16181c;
    --border:   #272a30;
    --text:     #e8e9eb;
    --muted:    #6b7280;
    --accent: #c11cff;
    --accent2:  #4ade80;
    --claude:   #D97706;
    --gpt:      #10A37F;
    --gemini:   #4285F4;
    --xai:      #e4e4e7;
    --radius:   10px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 1fr;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }

  .brand {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .brand p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 20px 8px;
  }

  /* model picker */
  .model-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0 12px;
    max-height: 40vh;
    overflow-y: auto;
  }
  .model-list::-webkit-scrollbar { width: 4px; }
  .model-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .model-group-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 12px 4px;
    font-weight: 600;
  }
  .model-group-label[data-provider="anthropic"] { color: var(--claude); }
  .model-group-label[data-provider="openai"]    { color: var(--gpt); }
  .model-group-label[data-provider="gemini"]    { color: var(--gemini); }
  .model-group-label[data-provider="xai"]       { color: var(--xai); }
  .model-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .model-btn:hover { background: var(--border); }
  .model-btn.active { border-color: var(--border); background: rgba(255,255,255,.04); }
  .model-btn .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .model-btn[data-provider="anthropic"] .dot { background: var(--claude); }
  .model-btn[data-provider="openai"]    .dot { background: var(--gpt); }
  .model-btn[data-provider="gemini"]    .dot { background: var(--gemini); }
  .model-btn.active .dot { box-shadow: 0 0 0 3px rgba(255,255,255,.1); }

  /* project list */
  .project-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .project-list::-webkit-scrollbar { width: 4px; }
  .project-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .no-proj {
    color: var(--muted);
    font-size: 11px;
    padding: 8px 12px;
    font-style: italic;
  }

  /* folder tree */
  .tree-node {
    display: flex;
    flex-direction: column;
  }
  .tree-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
  }
  .tree-row:hover { color: var(--text); background: var(--border); }
  .tree-row.active {
    color: var(--accent);
    border-color: rgba(232,197,71,.2);
    background: rgba(232,197,71,.05);
  }
  .tree-chevron {
    width: 14px; height: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s;
    opacity: .5;
  }
  .tree-chevron.open { transform: rotate(90deg); }
  .tree-chevron.empty { visibility: hidden; }
  .tree-row svg.folder-icon { flex-shrink: 0; opacity: .6; }
  .tree-row.active svg.folder-icon { opacity: 1; }
  .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .tree-badge {
    font-size: 9px;
    color: var(--muted);
    background: rgba(255,255,255,.04);
    padding: 1px 5px;
    border-radius: 4px;
    flex-shrink: 0;
    opacity: .6;
  }
  .tree-children {
    display: none;
    flex-direction: column;
  }
  .tree-children.open { display: flex; }
  .tree-loading {
    color: var(--muted);
    font-size: 10px;
    font-style: italic;
    padding: 4px 8px;
  }

  .clear-proj {
    margin: 0 12px 8px;
    padding: 7px 12px;
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
  }
  .clear-proj:hover { color: var(--text); border-color: var(--muted); }

  /* ── MAIN ── */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .context-badge {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .context-badge span {
    color: var(--accent);
    font-weight: 600;
  }
  .model-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .model-badge.anthropic { color: var(--claude); border-color: rgba(192,132,252,.3); background: rgba(192,132,252,.05); }
  .model-badge.openai    { color: var(--gpt);    border-color: rgba(96,165,250,.3);  background: rgba(96,165,250,.05); }
  .model-badge.gemini    { color: var(--gemini); border-color: rgba(249,115,22,.3);  background: rgba(249,115,22,.05); }
  .model-badge.xai       { color: var(--xai);    border-color: rgba(228,228,231,.3); background: rgba(228,228,231,.05); }

  /* chat */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    margin: auto;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: .5;
  }
  .empty-state .icon {
    width: 56px; height: 56px;
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .empty-state p { font-size: 13px; color: var(--muted); max-width: 260px; line-height: 1.6; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 820px;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }

  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .5px;
    padding: 0 4px;
  }
  .msg-bubble {
    padding: 13px 17px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 700px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--accent);
    color: #0e0f11;
    border-bottom-right-radius: 3px;
  }
  .msg.ai .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }

  /* ── markdown in AI bubbles ── */
  .msg.ai .msg-bubble { white-space: normal; }
  .msg.ai .msg-bubble p { margin: 0 0 .6em; }
  .msg.ai .msg-bubble p:last-child { margin-bottom: 0; }
  .msg.ai .msg-bubble ul, .msg.ai .msg-bubble ol { margin: 0 0 .6em 1.4em; }
  .msg.ai .msg-bubble li { margin-bottom: .25em; }
  .msg.ai .msg-bubble strong { color: var(--accent); }
  .msg.ai .msg-bubble code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: rgba(255,255,255,.06);
    padding: 2px 5px;
    border-radius: 4px;
  }
  .msg.ai .msg-bubble pre {
    background: rgba(0,0,0,.35);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: .6em 0;
  }
  .msg.ai .msg-bubble pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .msg.ai .msg-bubble h1, .msg.ai .msg-bubble h2, .msg.ai .msg-bubble h3 {
    font-family: 'Syne', sans-serif;
    margin: .8em 0 .4em;
    color: var(--text);
  }
  .msg.ai .msg-bubble h1 { font-size: 16px; }
  .msg.ai .msg-bubble h2 { font-size: 14px; }
  .msg.ai .msg-bubble h3 { font-size: 13px; }
  .msg.ai .msg-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--muted);
    margin: .6em 0;
  }
  .msg.ai .msg-bubble table { border-collapse: collapse; margin: .6em 0; width: 100%; }
  .msg.ai .msg-bubble th, .msg.ai .msg-bubble td {
    border: 1px solid var(--border);
    padding: 5px 10px;
    font-size: 12px;
    text-align: left;
  }
  .msg.ai .msg-bubble th { background: rgba(255,255,255,.04); }

  .typing-indicator {
    display: flex; gap: 4px; align-items: center; padding: 14px 17px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; border-bottom-left-radius: 3px; width: fit-content;
  }
  .typing-indicator span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce .9s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .15s; }
  .typing-indicator span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* input area */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    transition: border-color .15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  #question {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    min-height: 22px;
    max-height: 160px;
  }
  #question::placeholder { color: var(--muted); }
  #send-btn {
    flex-shrink: 0;
    width: 34px; height: 34px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0e0f11;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s, transform .1s;
  }
  #send-btn:hover { opacity: .85; }
  #send-btn:active { transform: scale(.95); }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; }

  .hint { font-size: 10px; color: var(--muted); margin-top: 6px; padding: 0 4px; }

  /* new chat btn */
  .new-chat-btn {
    margin: 8px 12px;
    padding: 8px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: all .15s;
  }
  .new-chat-btn:hover { color: var(--text); border-color: var(--muted); }

  /* web search toggle */
  .web-search-btn {
    flex-shrink: 0;
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .web-search-btn:hover { color: var(--text); border-color: var(--muted); }
  .web-search-btn.active {
    color: var(--accent2);
    border-color: rgba(74,222,128,.3);
    background: rgba(74,222,128,.08);
  }

  /* language toggle */
  .lang-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .lang-btn:hover { color: var(--text); border-color: var(--muted); }
</style>
</head>
<body>

<aside>
  <div class="brand">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h1>urzędasAI</h1>
      <button id="lang-btn" class="lang-btn">EN</button>
    </div>
    <p id="brand-sub">Asystent projektowy</p>
  </div>

  <div class="section-label">Model</div>
  <div class="model-list" id="model-list">
    <div class="no-proj">Ładowanie modeli…</div>
  </div>

  <div class="section-label" id="section-project">Projekt</div>
  <button class="clear-proj" id="clear-proj-btn">✦ Bez projektu (czat ogólny)</button>
  <div class="project-list" id="project-list">
    <div class="no-proj">Ładowanie projektów…</div>
  </div>

  <button class="new-chat-btn" id="new-chat-btn">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span id="new-chat-text">Nowa rozmowa</span>
  </button>
</aside>

<main>
  <header>
    <div class="header-left">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;" id="header-title">Czat ogólny</div>
      <div class="context-badge" id="header-sub">Nie wybrano projektu</div>
    </div>
    <div class="model-badge" id="model-badge">Ładowanie…</div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty-state">
      <div class="icon">✦</div>
      <p>Wybierz projekt z panelu bocznego i zadaj pytanie dotyczące jego zawartości.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="question" rows="1" placeholder="Zapytaj o coś…"></textarea>
      <button id="web-search-btn" class="web-search-btn active" title="Przełącz wyszukiwanie w sieci">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </button>
      <button id="send-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 12V2M2 7l5-5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="hint" id="hint">Enter — wyślij · Shift+Enter — nowa linia · 🌐 wyszukiwanie w sieci</div>
  </div>
</main>

<script>
const API = '';  // same origin

const PROVIDER_LABELS = { anthropic: 'Anthropic', openai: 'OpenAI', gemini: 'Gemini', xai: 'xAI' };

// ── i18n ──────────────────────────────────────────────────────────────────────
const I18N = {
  pl: {
    brandSub:         'Asystent projektowy',
    sectionProject:   'Projekt',
    clearProject:     '✦ Bez projektu (czat ogólny)',
    loadingModels:    'Ładowanie modeli…',
    loadingProjects:  'Ładowanie projektów…',
    newChat:          'Nowy czat',
    generalChat:      'Czat ogólny',
    noProjectSelected:'Nie wybrano projektu',
    loading:          'Ładowanie…',
    emptyState:       'Wybierz projekt z panelu bocznego i zadaj pytanie dotyczące jego zawartości.',
    placeholder:      'Zapytaj o coś…',
    hint:             'Enter — wyślij · Shift+Enter — nowa linia · 🌐 wyszukiwanie w sieci',
    webSearchTitle:   'Przełącz wyszukiwanie w sieci',
    failedModels:     'Nie udało się załadować modeli',
    noModels:         'Brak dostępnych modeli — sprawdź klucze API',
    failedProjects:   'Nie udało się załadować projektów',
    noFolders:        'Nie znaleziono folderów w /docs',
    filesLabel:       'plików',
    context:          'Kontekst',
    noModel:          'Brak modelu',
    projectLoaded:    'Projekt <strong style="color:var(--accent)">%s</strong> załadowany. Zadaj dowolne pytanie.',
    selectProject:    'Wybierz projekt lub po prostu zacznij rozmowę.',
    you:              'Ty',
    noModelSelected:  'Nie wybrano modelu. Poczekaj na załadowanie modeli lub sprawdź klucze API.',
    error:            'Błąd',
    networkError:     'Błąd sieci',
    langSwitch:       'EN',
  },
  en: {
    brandSub:         'Project-aware assistant',
    sectionProject:   'Project',
    clearProject:     '✦ No project (general chat)',
    loadingModels:    'Loading models…',
    loadingProjects:  'Loading projects…',
    newChat:          'New chat',
    generalChat:      'General Chat',
    noProjectSelected:'No project selected',
    loading:          'Loading…',
    emptyState:       'Select a project from the sidebar and ask anything about it.',
    placeholder:      'Ask something…',
    hint:             'Enter to send · Shift+Enter for new line · 🌐 toggle web search',
    webSearchTitle:   'Toggle web search',
    failedModels:     'Could not load models',
    noModels:         'No models available — check API keys',
    failedProjects:   'Could not load projects',
    noFolders:        'No folders found in /docs',
    filesLabel:       'files',
    context:          'Context',
    noModel:          'No model',
    projectLoaded:    'Project <strong style="color:var(--accent)">%s</strong> loaded. Ask anything about it.',
    selectProject:    'Select a project or just start chatting.',
    you:              'You',
    noModelSelected:  'No model selected. Please wait for models to load or check your API keys.',
    error:            'Error',
    networkError:     'Network error',
    langSwitch:       'PL',
  },
};

let lang = localStorage.getItem('docai-lang') || 'pl';
function t(key) { return I18N[lang][key]; }

let state = {
  provider:  null,
  model:     null,
  modelName: null,
  project:   null,
  history:   [],
  messages:  [],          // [{role:'user'|'ai', text, modelName}]
  webSearch: true,
};

// ── per-project chat persistence (survives refresh via localStorage) ─────────
const STORE_KEY = 'docai-chats';

// Load from localStorage on startup
let chatStore = {};
try {
  const raw = localStorage.getItem(STORE_KEY);
  if (raw) chatStore = JSON.parse(raw);
} catch { chatStore = {}; }

function chatKey(proj) { return proj || '__general__'; }

function _persistStore() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(chatStore));
  } catch (e) {
    // localStorage full — trim oldest chats
    const keys = Object.keys(chatStore);
    if (keys.length > 1) {
      delete chatStore[keys[0]];
      try { localStorage.setItem(STORE_KEY, JSON.stringify(chatStore)); } catch {}
    }
  }
}

function saveCurrentChat() {
  const key = chatKey(state.project);
  chatStore[key] = {
    history:     state.history.slice(),
    messages:    state.messages.slice(),
  };
  _persistStore();
}

function restoreChat(proj) {
  const key = chatKey(proj);
  const saved = chatStore[key];
  if (saved && saved.messages.length) {
    state.history  = saved.history.slice();
    state.messages = saved.messages.slice();
    rerenderMessages();
  } else {
    state.history  = [];
    state.messages = [];
    showEmptyState();
  }
}

function rerenderMessages() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  for (const m of state.messages) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${m.role}`;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = m.role === 'user' ? t('you') : (m.modelName || 'AI');

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (m.role === 'ai') {
      bubble.innerHTML = DOMPurify.sanitize(marked.parse(m.text));
    } else {
      bubble.textContent = m.text;
    }

    wrap.appendChild(meta);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
  }
  chat.scrollTop = chat.scrollHeight;
}

function showEmptyState() {
  const chat = document.getElementById('chat');
  chat.innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="icon">✦</div>
      <p>${state.project
        ? t('projectLoaded').replace('%s', state.project)
        : t('selectProject')}</p>
    </div>`;
}

// ── apply language to static UI elements ──────────────────────────────────────
function applyLang() {
  document.getElementById('brand-sub').textContent       = t('brandSub');
  document.getElementById('section-project').textContent = t('sectionProject');
  document.getElementById('clear-proj-btn').textContent  = t('clearProject');
  document.getElementById('new-chat-text').textContent   = t('newChat');
  document.getElementById('question').placeholder        = t('placeholder');
  document.getElementById('hint').textContent            = t('hint');
  document.getElementById('web-search-btn').title        = t('webSearchTitle');
  document.getElementById('lang-btn').textContent        = t('langSwitch');
  updateHeader();
  if (state.messages.length) rerenderMessages();
  else showEmptyState();
}

// ── model list ────────────────────────────────────────────────────────────────
async function loadModels() {
  const el = document.getElementById('model-list');
  try {
    const res  = await fetch(`${API}/api/models`);
    const data = await res.json();
    renderModels(data);
  } catch {
    el.innerHTML = `<div class="no-proj">${t('failedModels')}</div>`;
  }
}

function renderModels(data) {
  const el = document.getElementById('model-list');
  const providers = ['anthropic', 'openai', 'gemini', 'xai'];
  let html = '';
  let firstModel = null;

  for (const prov of providers) {
    const models = data[prov];
    if (!models || !models.length) continue;

    html += `<div class="model-group-label" data-provider="${prov}">${PROVIDER_LABELS[prov]}</div>`;
    for (const m of models) {
      if (!firstModel) firstModel = { provider: prov, id: m.id, name: m.name };
      html += `
        <button class="model-btn" data-provider="${prov}" data-model="${m.id}">
          <span class="dot"></span> ${m.name}
        </button>`;
    }
  }

  if (!html) {
    el.innerHTML = `<div class="no-proj">${t('noModels')}</div>`;
    return;
  }

  el.innerHTML = html;

  // select first model by default
  if (firstModel) {
    state.provider  = firstModel.provider;
    state.model     = firstModel.id;
    state.modelName = firstModel.name;
    const firstBtn = el.querySelector('.model-btn');
    if (firstBtn) firstBtn.classList.add('active');
    updateHeader();
  }

  // click handlers
  el.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.provider  = btn.dataset.provider;
      state.model     = btn.dataset.model;
      state.modelName = btn.textContent.trim();
      el.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateHeader();
    });
  });
}

// ── project tree browser ──────────────────────────────────────────────────────
async function loadProjects() {
  const el = document.getElementById('project-list');
  el.innerHTML = `<div class="no-proj">${t('loadingProjects')}</div>`;
  try {
    const res = await fetch(`${API}/api/browse?path=`);
    const data = await res.json();
    renderTree(data.children, el, 0);
  } catch {
    el.innerHTML = `<div class="no-proj">${t('failedProjects')}</div>`;
  }
}

const FOLDER_SVG = `<svg class="folder-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
  <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.086a1.5 1.5 0 0 1 1.06.44l.415.414A1.5 1.5 0 0 0 7.12 3.5H10.5A1.5 1.5 0 0 1 12 5v5a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 1 10V3.5Z"
    stroke="currentColor" stroke-width="1.2"/>
</svg>`;

const CHEVRON_SVG = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
  <path d="M3.5 2l3.5 3-3.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function renderTree(children, parentEl, depth) {
  if (!children || !children.length) {
    if (depth === 0) {
      parentEl.innerHTML = `<div class="no-proj">${t('noFolders')}</div>`;
    }
    return;
  }
  if (depth === 0) parentEl.innerHTML = '';

  for (const item of children) {
    const node = document.createElement('div');
    node.className = 'tree-node';

    const row = document.createElement('button');
    row.className = 'tree-row';
    row.style.paddingLeft = (8 + depth * 16) + 'px';
    row.dataset.path = item.path;

    const chevron = document.createElement('span');
    chevron.className = 'tree-chevron' + (item.has_children ? '' : ' empty');
    chevron.innerHTML = CHEVRON_SVG;

    const name = document.createElement('span');
    name.className = 'tree-name';
    name.textContent = item.name;

    row.innerHTML = '';
    row.appendChild(chevron);
    row.insertAdjacentHTML('beforeend', FOLDER_SVG);
    row.appendChild(name);

    if (item.file_count > 0) {
      const badge = document.createElement('span');
      badge.className = 'tree-badge';
      badge.textContent = `${item.file_count}`;
      row.appendChild(badge);
    }

    const childContainer = document.createElement('div');
    childContainer.className = 'tree-children';

    node.appendChild(row);
    node.appendChild(childContainer);
    parentEl.appendChild(node);

    // click handler
    row.addEventListener('click', async () => {
      // save current chat before switching
      saveCurrentChat();

      // select this folder as active project
      document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
      state.project = item.path;
      document.getElementById('clear-proj-btn').style.opacity = '.6';
      updateHeader();

      // restore chat for this project (or show empty state)
      restoreChat(item.path);

      // toggle expand/collapse if has children
      if (item.has_children) {
        const isOpen = childContainer.classList.contains('open');
        if (isOpen) {
          childContainer.classList.remove('open');
          chevron.classList.remove('open');
        } else {
          chevron.classList.add('open');
          // load children if not yet loaded
          if (!childContainer.dataset.loaded) {
            childContainer.innerHTML = `<div class="tree-loading" style="padding-left:${8 + (depth+1)*16}px">…</div>`;
            childContainer.classList.add('open');
            try {
              const res = await fetch(`${API}/api/browse?path=${encodeURIComponent(item.path)}`);
              const data = await res.json();
              childContainer.innerHTML = '';
              renderTree(data.children, childContainer, depth + 1);
              childContainer.dataset.loaded = '1';
            } catch {
              childContainer.innerHTML = '';
            }
          }
          childContainer.classList.add('open');
        }
      }
    });
  }
}

// ── sidebar buttons ───────────────────────────────────────────────────────────
document.getElementById('clear-proj-btn').addEventListener('click', () => {
  saveCurrentChat();
  state.project = null;
  document.querySelectorAll('.tree-row').forEach(b => b.classList.remove('active'));
  document.getElementById('clear-proj-btn').style.opacity = '1';
  updateHeader();
  restoreChat(null);
});

document.getElementById('new-chat-btn').addEventListener('click', () => {
  state.history  = [];
  state.messages = [];
  delete chatStore[chatKey(state.project)];
  _persistStore();
  showEmptyState();
});

// web search toggle
document.getElementById('web-search-btn').addEventListener('click', () => {
  state.webSearch = !state.webSearch;
  document.getElementById('web-search-btn').classList.toggle('active', state.webSearch);
});

// language toggle
document.getElementById('lang-btn').addEventListener('click', () => {
  lang = lang === 'pl' ? 'en' : 'pl';
  localStorage.setItem('docai-lang', lang);
  applyLang();
});

// ── header ────────────────────────────────────────────────────────────────────
function updateHeader() {
  const projName = state.project ? state.project.split('/').pop() : null;
  document.getElementById('header-title').textContent =
    projName ? projName : t('generalChat');
  document.getElementById('header-sub').innerHTML =
    state.project
      ? `${t('context')}: <span>${state.project}</span>`
      : t('noProjectSelected');
  const badge = document.getElementById('model-badge');
  badge.textContent  = state.modelName || t('noModel');
  badge.className    = `model-badge ${state.provider || ''}`;
}

// ── chat ──────────────────────────────────────────────────────────────────────
function appendMsg(role, text) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  // track for persistence
  state.messages.push({ role, text, modelName: state.modelName || 'AI' });

  const chat  = document.getElementById('chat');
  const wrap  = document.createElement('div');
  wrap.className = `msg ${role}`;

  const meta   = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = role === 'user' ? t('you') : (state.modelName || 'AI');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'ai') {
    bubble.innerHTML = DOMPurify.sanitize(marked.parse(text));
  } else {
    bubble.textContent = text;
  }

  wrap.appendChild(meta);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function showTyping() {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const chat = document.getElementById('chat');
  const el   = document.createElement('div');
  el.className = 'msg ai';
  el.id = 'typing';
  el.innerHTML = `
    <div class="msg-meta">${state.modelName || 'AI'}</div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ── send ──────────────────────────────────────────────────────────────────────
async function send() {
  const textarea = document.getElementById('question');
  const question = textarea.value.trim();
  if (!question) return;
  if (!state.provider || !state.model) {
    appendMsg('ai', t('noModelSelected'));
    return;
  }

  textarea.value = '';
  textarea.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', question);
  showTyping();

  try {
    const res  = await fetch(`${API}/api/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        project:       state.project,
        question,
        provider:      state.provider,
        model:         state.model,
        history:       state.history,
        web_search:    state.webSearch,
      }),
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      appendMsg('ai', `${t('error')}: ${err.detail || res.statusText}`);
      saveCurrentChat();
    } else {
      const data   = await res.json();
      const answer = data.answer;
      appendMsg('ai', answer);

      // update history (text only for context)
      state.history.push({ role: 'user',      content: question });
      state.history.push({ role: 'assistant', content: answer });

      // keep history manageable
      if (state.history.length > 40) state.history = state.history.slice(-40);


      // persist chat for this project
      saveCurrentChat();
    }
  } catch (e) {
    removeTyping();
    appendMsg('ai', `${t('networkError')}: ${e.message}`);
    saveCurrentChat();
  }

  document.getElementById('send-btn').disabled = false;
  textarea.focus();
}

document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// auto-resize textarea
document.getElementById('question').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

// ── init ──────────────────────────────────────────────────────────────────────
applyLang();
loadModels();
loadProjects();

// restore last chat from localStorage on page load
restoreChat(state.project);
</script>
</body>
</html>
